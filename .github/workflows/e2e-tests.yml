name: E2E Tests

# Standalone E2E testing workflow
# IMPORTANT: E2E test results do NOT block deployments
# Tests run separately from deployments, on-demand or on schedule
# Can also be called from other workflows for integration

on:
  # Manual trigger - run E2E tests on demand
  workflow_dispatch:
    inputs:
      environment:
        required: true
        type: choice
        description: 'Environment to test'
        options:
          - staging
          - production
      api_url:
        required: false
        type: string
        description: 'API URL to test against (optional, uses environment default if not provided)'

  # Scheduled runs - run E2E tests automatically
  schedule:
    # Run daily at 2 AM UTC against staging
    - cron: '0 2 * * *'

  # Allow other workflows to call this workflow
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: 'Environment to test (staging/production)'
      api_url:
        required: false
        type: string
        description: 'API URL to test against'
    secrets:
      TEST_WALLET:
        required: false
        description: 'Test wallet private key (uses environment secret if not provided)'

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # For scheduled runs, default to staging environment
    environment: ${{ inputs.environment || 'staging' }}

    steps:
      - name: Set environment defaults
        id: env
        run: |
          # Set environment (default to staging for scheduled runs)
          ENV="${{ inputs.environment || 'staging' }}"
          echo "environment=$ENV" >> $GITHUB_OUTPUT

          # Set API URL (use input or environment default)
          if [ -n "${{ inputs.api_url }}" ]; then
            echo "api_url=${{ inputs.api_url }}" >> $GITHUB_OUTPUT
          elif [ "$ENV" = "production" ]; then
            echo "api_url=${{ secrets.PRODUCTION_API_URL }}" >> $GITHUB_OUTPUT
          else
            echo "api_url=${{ secrets.STAGING_API_URL }}" >> $GITHUB_OUTPUT
          fi
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build packages
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          API_URL: ${{ steps.env.outputs.api_url }}
          TEST_WALLET: ${{ secrets.TEST_WALLET_STAGING || secrets.TEST_WALLET }}  # Environment secret
          CI: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results-${{ steps.env.outputs.environment }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-coverage-${{ steps.env.outputs.environment }}
          path: coverage/
          retention-days: 30

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ E2E tests failed for ${{ steps.env.outputs.environment }}

              [View test results](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

              ℹ️ Note: E2E test failures do NOT block deployments. These tests run separately for continuous quality monitoring.`
            })

      - name: Notify test results
        if: always() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const statusText = '${{ job.status }}' === 'success' ? 'passed' : 'failed';
            const trigger = '${{ github.event_name }}' === 'schedule' ? 'scheduled run' : 'manual trigger';

            const message = `${status} E2E tests ${statusText} for ${{ steps.env.outputs.environment }}

            **Trigger:** ${trigger}
            **API URL:** ${{ steps.env.outputs.api_url }}
            **Run at:** ${new Date().toISOString()}

            [View test results](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;

            console.log(message);
            // Could integrate with Slack/Discord for notifications
