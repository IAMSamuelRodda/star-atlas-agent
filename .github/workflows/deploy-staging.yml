name: Deploy to Staging

# Manual deployment to staging environment (AWS)
# Only deploys from main branch
# E2E tests run separately via e2e-tests.yml workflow

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # Required for AWS OIDC

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: staging
      url: https://staging.staratlas-agent.com  # Update with actual URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify main branch
        run: |
          CURRENT_BRANCH="${GITHUB_REF#refs/heads/}"
          if [ "$CURRENT_BRANCH" != "main" ]; then
            echo "❌ ERROR: Staging deployments must be from main branch"
            echo ""
            echo "Current branch: $CURRENT_BRANCH"
            echo "Required branch: main"
            echo ""
            echo "Please switch to main branch and re-run this workflow."
            exit 1
          fi
          echo "✓ Deploying from main branch"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build all packages
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STAGING }}  # Environment secret
          aws-region: ${{ secrets.AWS_REGION }}  # Repository secret

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.6.0'

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Apply (Staging)
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var-file=environments/staging/terraform.tfvars \
            -var="environment=staging"

      - name: Wait for deployment stabilization
        run: sleep 10

      - name: Health check
        run: |
          # Health check with retries
          for i in {1..5}; do
            if curl -f ${{ secrets.STAGING_API_URL }}/health; then  # Environment secret
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying..."
            sleep 10
          done
          echo "✗ Health check failed after 5 attempts"
          exit 1

      - name: Notify deployment result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '🚨';
            const statusText = '${{ job.status }}' === 'success' ? 'succeeded' : 'failed';

            const message = `${status} Staging deployment ${statusText}

            **Commit:** ${context.sha.substring(0, 7)}
            **Branch:** main
            **Triggered by:** ${context.actor}
            **Deployed at:** ${new Date().toISOString()}

            [View deployment logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})

            ℹ️ Run E2E tests separately using the \`E2E Tests\` workflow`;

            console.log(message);
            // Could integrate with Slack/Discord here
